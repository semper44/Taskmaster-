on:
  workflow_dispatch:
    inputs:
      tools_list:
        description: 'JSON matrix array'
        required: true
        type: string # Example: '["pytest", "ruff", "bandit", "odozi_visitors"]'
      custom_script_payload:
        description: 'Compiled OdoziVisitor class code and file walker'
        required: false
        type: string
        default: ''

jobs:
  # =========================================================================
  # JOB 1: PYTEST RUNNER
  # =========================================================================
  run-pytest:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'pytest')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pytest & Dependencies
        run: pip install django djangorestframework pytest pytest-json-report pytest-cov
      - name: Run Pytest
        # env:
        #   PYTEST_ADDOPTS: "-c /dev/null"
        run: |
          echo "=== OUTPUT_START ==="
           pwd
          find . -name "test*.py"
          pytest --collect-only
          pytest --json-report --json-report-file=report.json --cov=. --cov-report=json || true
          tail -c 2000 report.json || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 2: RUFF RUNNER
  # =========================================================================
  run-ruff:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'ruff')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: |
          echo "=== OUTPUT_START ==="
          ruff check --output-format json . || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 3: BANDIT RUNNER
  # =========================================================================
  run-bandit:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'bandit')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Security
        run: |
          echo "=== OUTPUT_START ==="
          bandit -r . -lll -f json || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 4: ODOZI RUNNER
  # =========================================================================
  run-odozi:
    runs-on: ubuntu-latest
    if: contains(fromJson(fromJson(inputs.tools_list)), 'odozi_visitors')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Custom Odozi Code Engine
        run: |
          echo '${{ inputs.custom_script_payload }}' | base64 -d > odozi_runner.py
          echo "=== OUTPUT_START ==="
          python odozi_runner.py
          echo "=== OUTPUT_END ==="
