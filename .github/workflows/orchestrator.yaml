on:
  workflow_dispatch:
    inputs:
      tools_list:
        description: 'JSON matrix array'
        required: true
        type: string # Example: '["pytest", "ruff", "bandit", "odozi_visitors"]'
      custom_script_payload:
        description: 'Compiled OdoziVisitor class code and file walker'
        required: false
        type: string
        default: ''

# PRODUCTION SECURITY: Set global permissions to read-only
permissions:
  contents: read

jobs:
  # =========================================================================
  # JOB 1: PYTEST RUNNER
  # =========================================================================
  run-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: contains(fromJson(inputs.tools_list), 'pytest')

    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # --------------------------------------------------
          # Customer project dependencies
          # --------------------------------------------------

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          # --------------------------------------------------
          # Odozi-required tooling
          # --------------------------------------------------

          pip install \
            pytest \
            pytest-django \
            pytest-json-report \
            pytest-cov

      - name: Auto Discover and Execute Pytest
        shell: bash
        run: |

          echo "=== OUTPUT_START ==="

          TEST_EXIT_CODE=0

          # --------------------------------------------------
          # Locate Django project if present
          # --------------------------------------------------

          MANAGE_PY=$(find . -name "manage.py" | head -n 1)

          if [ -n "$MANAGE_PY" ]; then

            PROJECT_DIR=$(dirname "$MANAGE_PY")

            echo "Detected Django project:"
            echo "$PROJECT_DIR"

            export PYTHONPATH="$PROJECT_DIR:$PYTHONPATH"

            SETTINGS_FILE=$(find "$PROJECT_DIR" -name "settings.py" | head -n 1)

            if [ -n "$SETTINGS_FILE" ]; then

              SETTINGS_MODULE=$(
                echo "$SETTINGS_FILE" \
                | sed 's|^\./||' \
                | sed 's|/|.|g' \
                | sed 's|\.py$||'
              )

              export DJANGO_SETTINGS_MODULE="$SETTINGS_MODULE"

              echo "DJANGO_SETTINGS_MODULE=$SETTINGS_MODULE"
            fi

            echo ""
            echo "Collected tests:"
            pytest "$PROJECT_DIR" --collect-only || true

            pytest "$PROJECT_DIR" \
              --json-report \
              --json-report-file=report.json \
              --cov="$PROJECT_DIR" \
              --cov-report=json \
              || TEST_EXIT_CODE=$?

          else

            echo "No Django project detected."

            echo ""
            echo "Collected tests:"
            pytest --collect-only || true

            pytest \
              --json-report \
              --json-report-file=report.json \
              --cov=. \
              --cov-report=json \
              || TEST_EXIT_CODE=$?

          fi

          echo ""
          echo "---- JSON REPORT TAIL ----"

          tail -c 5000 report.json || true

          echo ""
          echo "=== OUTPUT_END ==="

          exit $TEST_EXIT_CODE


  # run-pytest:
  #   runs-on: ubuntu-latest
  #   if: contains(fromJson(inputs.tools_list), 'pytest')
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'
  #     - name: Install Pytest & Dependencies
  #       run: pip install django djangorestframework pytest pytest-json-report pytest-cov
  #     - name: Run Pytest
  #       # env:
  #       #   PYTEST_ADDOPTS: "-c /dev/null"
  #       run: |
  #         echo "=== OUTPUT_START ==="
  #          pwd
  #         find . -name "test*.py"
  #         pytest --collect-only
  #         pytest --json-report --json-report-file=report.json --cov=. --cov-report=json || true
  #         tail -c 2000 report.json || true
  #         echo "=== OUTPUT_END ==="


  # =========================================================================
  # JOB 2: RUFF RUNNER
  # =========================================================================
  run-ruff:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'ruff')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: |
          echo "=== OUTPUT_START ==="
          ruff check --output-format json . || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 3: BANDIT RUNNER
  # =========================================================================
  run-bandit:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'bandit')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Security
        run: |
          echo "=== OUTPUT_START ==="
          bandit -r . -lll -f json || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 4: ODOZI RUNNER
  # =========================================================================
  run-odozi:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'odozi_visitors')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Custom Odozi Code Engine
        run: |
          echo '${{ inputs.custom_script_payload }}' | base64 -d > odozi_runner.py
          echo "=== OUTPUT_START ==="
          python odozi_runner.py
          echo "=== OUTPUT_END ==="
