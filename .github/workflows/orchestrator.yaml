on:
  workflow_dispatch:
    inputs:
      tools_list:
        description: 'JSON matrix array'
        required: true
        type: string # Example: '["pytest", "ruff", "bandit", "odozi_visitors"]'
      backend_url:
        description: 'The API target endpoint (Use Ngrok/LocalTunnel for local testing)'
        required: true
        type: string
        default: 'https://afraid-dolls-fail.loca.lt'
      custom_script_payload:
        description: 'Compiled OdoziVisitor class code and file walker'
        required: false
        type: string
        default: ''

# PRODUCTION SECURITY: Set global permissions to read-only
permissions:
  contents: read

jobs:
  # =========================================================================
  # JOB 1: PYTEST RUNNER
  # =========================================================================
  run-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: contains(fromJson(inputs.tools_list), 'pytest')

    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # --------------------------------------------------
          # Customer project dependencies
          # --------------------------------------------------

          REQ_FILE=$(find . -name "requirements.txt" | head -n 1)
          if [ -n "$REQ_FILE" ]; then
              echo "Installing from $REQ_FILE"
              pip install -r "$REQ_FILE"
          fi

          # --------------------------------------------------
          # Odozi-required tooling
          # --------------------------------------------------

          pip install \
            pytest \
            pytest-django \
            pytest-json-report \
            pytest-cov

      - name: Display Python Version
        run: echo $PYTHONPATH
             echo $DJANGO_SETTINGS_MODULE

      - name: Auto-Discover, Run & Stream Pytest in Chunks
        shell: bash
        run: |
          echo "=== OUTPUT_START ==="
          MANAGE_PY_PATH=$(find . -name "manage.py" | head -n 1)
          if [ -z "$MANAGE_PY_PATH" ]; then
            RUN_CMD="pytest --json-report --json-report-file=report.json --cov=. --cov-report=json"
          else
            PROJECT_DIR=$(dirname "$MANAGE_PY_PATH")
            if [ -f "$PROJECT_DIR/requirements.txt" ]; then pip install -r "$PROJECT_DIR/requirements.txt"; fi
            SETTINGS_MOD=$(grep -oE "['\"][a-zA-Z0-9_\.]+\.settings['\"]" "$MANAGE_PY_PATH" | tr -d "'\"" | head -n 1)
            if [ -z "$SETTINGS_MOD" ]; then
               SETTINGS_DIR=$(find "$PROJECT_DIR" -name "settings.py" | head -n 1)
               SETTINGS_MOD=$(echo "$SETTINGS_DIR" | sed "s|^$PROJECT_DIR/||" | sed 's|/|.|g' | sed 's|\.py$||')
            fi
            export PYTHONPATH="$PROJECT_DIR:$PYTHONPATH"
            export DJANGO_SETTINGS_MODULE="$SETTINGS_MOD"
            RUN_CMD="pytest $PROJECT_DIR --json-report --json-report-file=report.json --cov=$PROJECT_DIR --cov-report=json"
          fi
          
          # Inline Python script buffers output into 2-second or 20-line chunks
          python -c "
          import sys, urllib.request, json, time
          buffer = []
          last_flush = time.time()
          url = '${{ inputs.backend_url }}/dashboard/results/'
          headers = {'Content-Type': 'application/json', 'bypass-tunnel-reminder': 'true'}
          
          def flush():
              global buffer, last_flush
              if not buffer: return
              payload = {'run_id': '${{ github.run_id }}', 'tool': 'pytest', 'logs': buffer}
              try:
                  req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers=headers, method='POST')
                  with urllib.request.urlopen(req, timeout=5) as response: pass
              except Exception as e: sys.stderr.write(f'Flush failed: {e}\n')
              buffer, last_flush = [], time.time()

          for line in sys.stdin:
              sys.stdout.write(line)
              buffer.append(line.strip())
              if len(buffer) >= 20 or (time.time() - last_flush) > 2.0: flush()
          flush()
          " < <($RUN_CMD 2>&1)

          echo "TEST_EXIT_CODE=${PIPESTATUS}" >> $GITHUB_ENV
          echo "=== OUTPUT_END ==="

      - name: Send Final Pytest Structured Report
        if: always()
        run: |
          if [ -f "report.json" ]; then
            curl -X POST "${{ inputs.backend_url }}/dashboard/results/"
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
              -H "bypass-tunnel-reminder: true"
              -F "run_id=${{ github.run_id }}" 
              -F "repo=${{ github.repository }}" 
              -F "tool=pytest" 
              -F "file=@report.json"
          fi
          exit ${{ env.TEST_EXIT_CODE }}

  # run-pytest:
  #   runs-on: ubuntu-latest
  #   if: contains(fromJson(inputs.tools_list), 'pytest')
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'
  #     - name: Install Pytest & Dependencies
  #       run: pip install django djangorestframework pytest pytest-json-report pytest-cov
  #     - name: Run Pytest
  #       # env:
  #       #   PYTEST_ADDOPTS: "-c /dev/null"
  #       run: |
  #         echo "=== OUTPUT_START ==="
  #          pwd
  #         find . -name "test*.py"
  #         pytest --collect-only
  #         pytest --json-report --json-report-file=report.json --cov=. --cov-report=json || true
  #         tail -c 2000 report.json || true
  #         echo "=== OUTPUT_END ==="


  # =========================================================================
  # JOB 2: RUFF RUNNER
  # =========================================================================
  run-ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: contains(fromJson(inputs.tools_list), 'ruff')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: |
          echo "=== OUTPUT_START ==="
          ruff check --output-format json .  > ruff_report.json || true
          cat ruff_report.json
          
          curl -X POST "${{ inputs.backend_url }}/dashboard/results/" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "bypass-tunnel-reminder: true" \
            -F "run_id=${{ github.run_id }}" \
            -F "repo=${{ github.repository }}" \
            -F "tool=ruff" \
            -F "file=@ruff_report.json"
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 3: BANDIT RUNNER
  # =========================================================================
  run-bandit:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'bandit')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Security
        run: |
          echo "=== OUTPUT_START ==="
          bandit -r . -lll -f json  > bandit_report.json || true
          cat bandit_report.json
          
          curl -X POST "${{ inputs.backend_url }}/dashboard/results/" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "bypass-tunnel-reminder: true" \
            -F "run_id=${{ github.run_id }}" \
            -F "repo=${{ github.repository }}" \
            -F "tool=bandit" \
            -F "file=@bandit_report.json"
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 4: ODOZI RUNNER
  # =========================================================================
  run-odozi:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'odozi_visitors')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Custom Odozi Code Engine
        run: |
          echo '${{ inputs.custom_script_payload }}' | base64 -d > odozi_runner.py
          echo "=== OUTPUT_START ==="
          python odozi_runner.py > odozi_report.json || true
          cat odozi_report.json
          
          curl -X POST "${{ inputs.backend_url }}/dashboard/results/" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "bypass-tunnel-reminder: true" \
            -F "run_id=${{ github.run_id }}" \
            -F "repo=${{ github.repository }}" \
            -F "tool=odozi_visitors" \
            -F "file=@odozi_report.json"
          echo "=== OUTPUT_END ==="


