  # =========================================================================
  # JOB 2: RUFF RUNNER
  # =========================================================================
  run-ruff:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'ruff')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: |
          echo "=== OUTPUT_START ==="
          ruff check --output-format json . || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 3: BANDIT RUNNER
  # =========================================================================
  run-bandit:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'bandit')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Security
        run: |
          echo "=== OUTPUT_START ==="
          bandit -r . -lll -f json || true
          echo "=== OUTPUT_END ==="

  # =========================================================================
  # JOB 4: ODOZI RUNNER
  # =========================================================================
  run-odozi:
    runs-on: ubuntu-latest
    if: contains(fromJson(inputs.tools_list), 'odozi_visitors')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Custom Odozi Code Engine
        run: |
          echo '${{ inputs.custom_script_payload }}' | base64 -d > odozi_runner.py
          echo "=== OUTPUT_START ==="
          python odozi_runner.py
          echo "=== OUTPUT_END ==="
